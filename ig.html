<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IG留言抽獎機</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="machine" aria-labelledby="app-title">
      <img class="crest crest-top" src="img/IMG_0223.PNG" alt="" />
      <img class="crest crest-bottom" src="img/IMG_0224.PNG" alt="" />

      <section class="stage">
        <header class="brand">
          <img src="img/logo.png" alt="Aetheris II Finale" class="logo" />
          <p class="eyebrow">IG留言</p>
          <h1 id="app-title">留言抽獎機</h1>
        </header>

        <div class="draw-area" aria-live="polite">
          <div class="reel-shell">
            <img class="corner corner-left" src="img/IMG_0225.PNG" alt="" />
            <img class="corner corner-right" src="img/IMG_0227.PNG" alt="" />
            <div class="selector-line"></div>
            <div class="reel-window">
              <ul class="reel" id="reel"></ul>
            </div>
          </div>

          <div class="result-panel">
            <span class="label">抽選結果</span>
            <strong id="resultText">等待抽選</strong>
          </div>
        </div>

        <footer class="controls">
          <button id="drawButton" type="button">抽選開始</button>
          <button id="resetButton" type="button" class="secondary">重置技庫</button>
          <p id="remainingText">剩餘 0 / 0 則留言</p>
        </footer>

        <section class="drawn-history" aria-labelledby="history-title">
          <h2 id="history-title">已抽留言</h2>
          <ul id="drawnList">
            <li class="empty">尚未抽出</li>
          </ul>
        </section>
      </section>
    </main>

    <script src="ig.js"></script>
  </body>
</html>
